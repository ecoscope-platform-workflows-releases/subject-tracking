id: subject_tracking
requirements:
  - name: ecoscope
    git: https://github.com/wildlife-dynamics/ecoscope
    branch: am/percentile-area
    extras: [analysis,mapping,plotting,platform]
  # ecoscope-platform already declares this exact pydeck dependency. it is
  # re-stated here as a workaround for a known issue. for further detail, see:
  # https://github.com/wildlife-dynamics/wt/issues/167#issuecomment-4451993697
  - name: pydeck
    version: 0.9.2
    channel: conda-forge
rjsf-overrides:
  properties:
    Subject Group.properties.subject_obs.properties.subject_group_name.ecoscope:transform:
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: subject_group_name
          depends_on: properties.er_client_name.properties.data_source.properties.name
    groupers.properties.groupers.ecoscope:transform:
      - transformer: EarthRangerEnumResolver
        transformer_kws:
          type: spatial_feature_group
          depends_on: properties.er_client_name.properties.data_source.properties.name
    Time Density Map.properties.set_etd_args.properties.opacity.default: 0.700000
  $defs:
    ValueGrouper.properties.index_name.oneOf:
      - const: subject_name
        title: Subject Name
      - const: subject_subtype
        title: Subject Subtype
      - const: subject_sex
        title: Subject Sex
  uiSchema:
    groupers.groupers.items.anyOf:
      - ui:options:
          label: false
      - ui:options:
          label: false
      - ui:options:
          label: false
    base_map_defs.base_maps.items.ui:options.label: false
    Time Density Map.td.auto_scale_or_custom_cell_size:
      anyOf:
        - ui:help: Auto-scale for an optimized grid cell size based the workflow data or Customize to set a specific grid cell size.
          ui:options:
            label: false
          auto_scale_or_custom:
            ui:widget: hidden
        - ui:options:
            label: false
          auto_scale_or_custom:
            ui:widget: hidden
      auto_scale_or_custom:
        ui:widget: hidden
task-instance-defaults:
  skipif:
    conditions:
      - any_is_empty_df
      - any_dependency_skipped
workflow:
  - name: Workflow Details
    id: workflow_details
    task: set_workflow_details
  - name: Data Source
    id: er_client_name
    task: set_er_connection
  - name: Time Range
    id: time_range
    task: set_time_range
    partial:
      time_format: '%d %b %Y %H:%M:%S'
  - name: Extract Timezone Selection
    id: get_timezone
    task: get_timezone_from_time_range
    partial:
      time_range: ${{ workflow.time_range.return }}
  - title: Subject Group
    type: task-group
    description: Choose a subject group to analyze
    tasks:
      - name: null
        id: subject_obs
        task: get_subjectgroup_observations
        partial:
          client: ${{ workflow.er_client_name.return }}
          time_range: ${{ workflow.time_range.return }}
          raise_on_empty: false
          include_details: false
          include_subjectsource_details: false
          filter: clean
  - name: Warn if mixed subtype
    id: warn_if_mixed_subtype
    task: mixed_subtype_warning
    skipif:
      conditions:
        - never
    partial:
      subject_obs: ${{ workflow.subject_obs.return }}
  - name: Convert to timezone
    id: convert_to_user_timezone
    task: convert_values_to_timezone
    partial:
      df: ${{ workflow.subject_obs.return }}
      timezone: ${{ workflow.get_timezone.return }}
      columns:
        - fixtime
  - name: Group Data
    id: groupers
    task: set_groupers
  - task: extract_spatial_grouper_feature_group_names
    id: spatial_group_ids
    partial:
      groupers: ${{ workflow.groupers.return }}
  - task: get_spatial_features_group
    id: fetch_all_spatial_feature_groups
    partial:
      client: ${{ workflow.er_client_name.return }}
    map:
      argnames: spatial_features_group_name
      argvalues: ${{ workflow.spatial_group_ids.return }}
  - task: resolve_spatial_feature_groups_for_spatial_groupers
    id: resolved_groupers
    skipif:
      conditions:
        - never
    partial:
      groupers: ${{ workflow.groupers.return }}
      spatial_feature_groups: ${{ workflow.fetch_all_spatial_feature_groups.return }}
  - name: Transform Observations to Relocations
    id: subject_reloc
    task: process_relocations
    partial:
      observations: ${{ workflow.convert_to_user_timezone.return }}
      relocs_columns:
        - groupby_col
        - fixtime
        - junk_status
        - geometry
        - extra__subject__name
        - extra__subject__subject_subtype
        - extra__subject__sex
      filter_point_coords:
        - x: 180.000000
          y: 90.000000
        - x: 0.000000
          y: 0.000000
        - x: 1.000000
          y: 1.000000
  - name: Apply Day/Night Labels to Relocations
    id: day_night_labels
    task: classify_is_night
    partial:
      relocations: ${{ workflow.subject_reloc.return }}
  - name: Trajectory Segment Filter
    id: subject_traj
    task: relocations_to_trajectory
    partial:
      relocations: ${{ workflow.day_night_labels.return }}
  - name: Add temporal index to Subject Trajectories
    id: traj_add_temporal_index
    task: add_temporal_index
    partial:
      df: ${{ workflow.subject_traj.return }}
      time_col: segment_start
      groupers: ${{ workflow.resolved_groupers.return }}
      cast_to_datetime: true
      format: mixed
  - name: Add spatial index to Subject Trajectories
    id: traj_add_spatial_index
    task: add_spatial_index
    partial:
      gdf: ${{ workflow.traj_add_temporal_index.return }}
      groupers: ${{ workflow.resolved_groupers.return }}
  - name: Rename value grouper columns
    id: rename_grouper_columns
    task: map_columns
    partial:
      df: ${{ workflow.traj_add_spatial_index.return }}
      drop_columns: []
      retain_columns: []
      rename_columns:
        extra__name: subject_name
        extra__subject_subtype: subject_subtype
        extra__sex: subject_sex
      raise_if_not_found: true
  - name: Map Subject Sex Values
    id: map_subject_sex
    task: map_values
    partial:
      df: ${{ workflow.rename_grouper_columns.return }}
      column_name: subject_sex
      value_map:
        male: male
        female: female
      missing_values: replace
      replacement: unknown
  - name: Classify Trajectories By Speed
    id: classify_traj_speed
    task: apply_classification
    partial:
      df: ${{ workflow.map_subject_sex.return }}
      input_column_name: speed_kmhr
      output_column_name: speed_bins
      classification_options:
        scheme: equal_interval
        k: 6
      label_options:
        label_ranges: true
        label_decimals: 1
        label_suffix: ' km/h'
  - name: Set Trajectory Map Title
    id: set_traj_map_title
    task: set_string_var
    partial:
      var: Subject Group Trajectory Map
  - name: Set Time Density Map Title
    id: set_td_map_title
    task: set_string_var
    partial:
      var: Home Range Map
  - name: Set Night/Day Map Title
    id: set_night_day_map_title
    task: set_string_var
    partial:
      var: Subject Group Night/Day Map
  - name: Set NSD Chart Title
    id: set_nsd_chart_title
    task: set_string_var
    partial:
      var: Net Square Displacement
  - name: Split Subject Trajectories by Group
    id: split_subject_traj_groups
    task: split_groups
    partial:
      df: ${{ workflow.classify_traj_speed.return }}
      groupers: ${{ workflow.resolved_groupers.return }}
  - name: Map Base Layers
    id: base_map_defs
    task: set_base_maps
  - name: Sort Trajetories By Classification
    id: sort_traj_speed
    task: sort_values
    partial:
      column_name: speed_kmhr
      ascending: true
      na_position: last
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_subject_traj_groups.return }}
  - name: Apply Color to Trajectories By Speed
    id: colormap_traj_speed
    task: apply_color_map
    partial:
      input_column_name: speed_bins
      output_column_name: speed_bins_colormap
      colormap:
        - '#1a9850'
        - '#91cf60'
        - '#d9ef8b'
        - '#fee08b'
        - '#fc8d59'
        - '#d73027'
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.sort_traj_speed.return }}
  - name: Rename columns for map tooltip display
    id: rename_speed_display_columns
    task: map_columns
    partial:
      drop_columns: []
      retain_columns: []
      rename_columns:
        segment_start: Start
        timespan_seconds: Duration (s)
        speed_kmhr: Speed (kph)
        extra__is_night: Nighttime
        subject_name: Subject Name
        subject_sex: Subject Sex
      raise_if_not_found: true
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.colormap_traj_speed.return }}
  - name: Persist speed traj to parquet
    id: persist_speed_parquet
    task: persist_geoarrow_for_pydeck
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
        - all_geometry_are_none
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}          
      filename: null
    mapvalues:
      argnames: gdf
      argvalues: ${{ workflow.rename_speed_display_columns.return }}
  - name: Combine speed gdf and data url
    id: combine_speed_gdf_and_url
    skipif:
      conditions:
        - any_keyed_iterables_are_skips
      unpack_depth: 1
    task: groupbykey
    partial:
      iterables:
        - ${{ workflow.rename_speed_display_columns.return }}
        - ${{ workflow.persist_speed_parquet.return }}
  - name: Create map layer for each trajectory group
    id: traj_map_layers
    task: create_geoarrow_path_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
        - all_geometry_are_none
    partial:
      layer_style:
        get_color: speed_bins_colormap
      legend:
        title: Speed
        label_column: speed_bins
        color_column: speed_bins_colormap
      tooltip_columns:
        - Start
        - Duration (s)
        - Speed (kph)
        - Nighttime
        - Subject Name
        - Subject Sex
    mapvalues:
      argnames: [geodataframe, data_url]
      argvalues: ${{ workflow.combine_speed_gdf_and_url.return }}
  - name: Draw maps for each trajectory group
    id: traj_map
    task: draw_map
    partial:
      tile_layers: ${{ workflow.base_map_defs.return }}
      legend_style:
        format_title: false
        placement: bottom-right
      static: false
      output_type: json
      title: null
      view_state: null
      max_zoom: 20
      widget_id: ${{ workflow.set_traj_map_title.return }}
    mapvalues:
      argnames: geo_layers
      argvalues: ${{ workflow.traj_map_layers.return }}
  - name: Create Map Widgets for Trajectories
    id: traj_map_widgets_single_views
    task: create_map_v2_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: ${{ workflow.set_traj_map_title.return }}
    map:
      argnames:
        - view
        - data
      argvalues: ${{ workflow.traj_map.return }}
  - name: Merge map Widget Views
    id: traj_grouped_map_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.traj_map_widgets_single_views.return }}
  - name: Sort Trajetories By Night/Day Classification
    id: sort_traj_night_day
    task: sort_values
    partial:
      column_name: extra__is_night
      ascending: false
      na_position: last
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_subject_traj_groups.return }}
  - name: Cast Night/Day Column
    id: night_day_to_string
    task: convert_column_values_to_string
    partial:
      columns:
        - extra__is_night
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.sort_traj_night_day.return }}
  - name: Apply Color to Trajectories By Day/Night
    id: colormap_traj_night
    task: apply_color_map
    partial:
      colormap:
        "True": '#292965'   # night
        "False": '#e7a553'  # day
      input_column_name: extra__is_night
      output_column_name: is_night_colors
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.night_day_to_string.return }}
  - name: Rename columns for map tooltip display
    id: rename_nightday_display_columns
    task: map_columns
    partial:
      drop_columns: []
      retain_columns: []
      rename_columns:
        subject_name: Subject Name
        subject_sex: Subject Sex
        extra__is_night: Nighttime
      raise_if_not_found: true
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.colormap_traj_night.return }}
  - name: Persist night day traj to parquet
    id: persist_night_day_parquet
    task: persist_geoarrow_for_pydeck
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
        - all_geometry_are_none
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}          
      filename: null
    mapvalues:
      argnames: gdf
      argvalues: ${{ workflow.rename_nightday_display_columns.return }}
  - name: Combine night dat gdf and data url
    id: combine_night_day_gdf_and_url
    skipif:
      conditions:
        - any_keyed_iterables_are_skips
      unpack_depth: 1
    task: groupbykey
    partial:
      iterables:
        - ${{ workflow.rename_nightday_display_columns.return }}
        - ${{ workflow.persist_night_day_parquet.return }}
  - name: Create map layer for each trajectory group
    id: traj_map_night_layers
    task: create_geoarrow_path_layer
    skipif:
      conditions:
        - any_is_empty_df
        - any_dependency_skipped
        - all_geometry_are_none
    partial:
      layer_style:
        get_color: is_night_colors
      legend:
        title: Day / Night Movement
        values:
          - label: Night
            color: '#292965'
          - label: Day
            color: '#e7a553'
      tooltip_columns:
        - Subject Name
        - Subject Sex
        - Nighttime
    mapvalues:
      argnames: [geodataframe, data_url]
      argvalues: ${{ workflow.combine_night_day_gdf_and_url.return }}
  - name: Draw maps for each trajectory group
    id: traj_nightday_map
    task: draw_map
    partial:
      tile_layers: ${{ workflow.base_map_defs.return }}
      legend_style:
        format_title: false
        placement: bottom-right
      static: false
      output_type: json
      title: null
      view_state: null
      max_zoom: 20
      widget_id: ${{ workflow.set_night_day_map_title.return }}
    mapvalues:
      argnames: geo_layers
      argvalues: ${{ workflow.traj_map_night_layers.return }}
  - name: Create Map Widgets for Trajectories
    id: traj_map_nightday_widgets_sv
    task: create_map_v2_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: ${{ workflow.set_night_day_map_title.return }}
    map:
      argnames:
        - view
        - data
      argvalues: ${{ workflow.traj_nightday_map.return }}
  - name: Merge map Widget Views
    id: traj_nightday_grouped_map_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.traj_map_nightday_widgets_sv.return }}
  - name: Calculate Mean Speed Per Group
    id: mean_speed
    task: dataframe_column_mean
    partial:
      column_name: speed_kmhr
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_subject_traj_groups.return }}
  - name: Convert Average Speed units
    id: average_speed_converted
    task: with_unit
    partial:
      original_unit: km/h
      new_unit: km/h
    mapvalues:
      argnames: value
      argvalues: ${{ workflow.mean_speed.return }}
  - name: Create Single Value Widgets for Mean Speed Per Group
    id: mean_speed_sv_widgets
    task: create_single_value_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: Mean Speed
      decimal_places: 1
    map:
      argnames:
        - view
        - data
      argvalues: ${{ workflow.average_speed_converted.return }}
  - name: Merge per group Mean Speed SV widgets
    id: mean_speed_grouped_sv_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.mean_speed_sv_widgets.return }}
  - name: Calculate Max Speed Per Group
    id: max_speed
    task: dataframe_column_max
    partial:
      column_name: speed_kmhr
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_subject_traj_groups.return }}
  - name: Convert Max Speed units
    id: max_speed_converted
    task: with_unit
    partial:
      original_unit: km/h
      new_unit: km/h
    mapvalues:
      argnames: value
      argvalues: ${{ workflow.max_speed.return }}
  - name: Create Single Value Widgets for Max Speed Per Group
    id: max_speed_sv_widgets
    task: create_single_value_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: Max Speed
      decimal_places: 1
    map:
      argnames:
        - view
        - data
      argvalues: ${{ workflow.max_speed_converted.return }}
  - name: Merge per group Max Speed SV widgets
    id: max_speed_grouped_sv_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.max_speed_sv_widgets.return }}
  - name: Calculate Number of Locations Per Group
    id: num_location
    task: dataframe_count
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_subject_traj_groups.return }}
  - name: Create Single Value Widgets for Number of Location Per Group
    id: num_location_sv_widgets
    task: create_single_value_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: Number of Locations
      decimal_places: 1
    map:
      argnames:
        - view
        - data
      argvalues: ${{ workflow.num_location.return }}
  - name: Merge per group Number of Locations SV widgets
    id: num_location_grouped_sv_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.num_location_sv_widgets.return }}
  - name: Calculate Day/Night Ratio Per Group
    id: nightday_ratio
    task: get_night_day_ratio
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_subject_traj_groups.return }}
  - name: Create Single Value Widgets for Day/Night Ratio Per Group
    id: nightday_ratio_sv_widgets
    task: create_single_value_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: Night/Day Ratio
      decimal_places: 1
    map:
      argnames:
        - view
        - data
      argvalues: ${{ workflow.nightday_ratio.return }}
  - name: Merge per group Day/Night Ratio SV widgets
    id: nightday_ratio_grouped_sv_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.nightday_ratio_sv_widgets.return }}
  - name: Calculate Total Distance Per Group
    id: total_distance
    task: dataframe_column_sum
    partial:
      column_name: dist_meters
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_subject_traj_groups.return }}
  - name: Convert total distance units
    id: total_dist_converted
    task: with_unit
    partial:
      original_unit: m
      new_unit: km
    mapvalues:
      argnames: value
      argvalues: ${{ workflow.total_distance.return }}
  - name: Create Single Value Widgets for Total Distance Per Group
    id: total_distance_sv_widgets
    task: create_single_value_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: Total Distance
      decimal_places: 1
    map:
      argnames:
        - view
        - data
      argvalues: ${{ workflow.total_dist_converted.return }}
  - name: Merge per group Total Distance SV widgets
    id: total_dist_grouped_sv_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.total_distance_sv_widgets.return }}
  - name: Calculate Total Time Per Group
    id: total_time
    task: dataframe_column_sum
    partial:
      column_name: timespan_seconds
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_subject_traj_groups.return }}
  - name: Convert total time units
    id: total_time_converted
    task: with_unit
    partial:
      original_unit: s
      new_unit: h
    mapvalues:
      argnames: value
      argvalues: ${{ workflow.total_time.return }}
  - name: Create Single Value Widgets for Total Distance Per Group
    id: total_time_sv_widgets
    task: create_single_value_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: Total Time
      decimal_places: 1
    map:
      argnames:
        - view
        - data
      argvalues: ${{ workflow.total_time_converted.return }}
  - name: Merge per group Total Distance SV widgets
    id: total_time_grouped_sv_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.total_time_sv_widgets.return }}
  - title: Time Density Map
    type: task-group
    description: These settings show a grid-based heatmap showing where subjects spent the most time.
    tasks:
      - name: null
        id: set_etd_args
        task: set_etd_args_with_opacity
        partial:
          nodata_value: nan
          band_count: 1
      - id: etd_opacity
        task: get_opacity_from_combined_params
        partial:
          combined_params: ${{ workflow.set_etd_args.return }}
      - name: null
        id: td
        task: call_etd_from_combined_params
        partial:
          combined_params: ${{ workflow.set_etd_args.return }}
        mapvalues:
          argnames: trajectory_gdf
          argvalues: ${{ workflow.split_subject_traj_groups.return }}
      - name: Cast Percentile Column
        id: percentile_col_to_string
        task: convert_column_values_to_string
        partial:
          columns:
            - percentile
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.td.return }}
      - name: Time Density Colormap
        id: td_colormap
        task: apply_color_map
        partial:
          input_column_name: percentile
          colormap: RdYlGn_r
          output_column_name: percentile_colormap
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.percentile_col_to_string.return }}
      - name: Format area values for display
        id: sqkm_display
        task: map_values_with_unit
        partial:
          input_column_name: area_sqkm
          output_column_name: area_sqkm
          original_unit: "km²"
          new_unit: "km²"
          decimal_places: 2
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.td_colormap.return }}
      - name: Rename area column
        id: td_rename_display_columns
        task: map_columns
        partial:
          drop_columns: []
          retain_columns: []
          rename_columns:
            area_sqkm: "Area (km²)"
          raise_if_not_found: true
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.sqkm_display.return }}
      # calculate_etd by default outputs in EPSG:3857
      - name: Convert patrol td crs
        id: td_crs
        task: convert_crs
        partial:
          crs: "EPSG:4326"
        mapvalues:
          argnames: df
          argvalues: ${{ workflow.td_rename_display_columns.return }}      
      - name: Persist td to parquet
        id: persist_td_parquet
        task: persist_geoarrow_for_pydeck
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}          
          filename: null
        mapvalues:
          argnames: gdf
          argvalues: ${{ workflow.td_crs.return }}
      - name: Combine td gdf and data url
        id: combine_td_gdf_and_url
        skipif:
          conditions:
            - any_keyed_iterables_are_skips
          unpack_depth: 1
        task: groupbykey
        partial:
          iterables:
            - ${{ workflow.td_crs.return }}
            - ${{ workflow.persist_td_parquet.return }}
      - name: Create map layer from Time Density
        id: td_map_layer
        task: create_geoarrow_polygon_layer
        skipif:
          conditions:
            - any_is_empty_df
            - any_dependency_skipped
            - all_geometry_are_none
        partial:
          layer_style:
            get_fill_color: percentile_colormap
            opacity: ${{ workflow.etd_opacity.return }}
            get_line_width: 0
          legend:
            title: Time Spent
            label_column: percentile
            label_suffix: ' %'
            color_column: percentile_colormap
            sort: ascending
          tooltip_columns:
            - percentile
        mapvalues:
          argnames: [geodataframe, data_url]
          argvalues: ${{ workflow.combine_td_gdf_and_url.return }}
      - name: Draw map from Time Density
        id: td_map
        task: draw_map
        partial:
          tile_layers: ${{ workflow.base_map_defs.return }}
          legend_style:
            format_title: false
            placement: bottom-right
          static: false
          output_type: json
          title: null
          view_state: null
          max_zoom: 20
          widget_id: ${{ workflow.set_td_map_title.return }}
        mapvalues:
          argnames: geo_layers
          argvalues: ${{ workflow.td_map_layer.return }}
      - name: Create Time Density Map Widget
        id: td_map_widget
        task: create_map_v2_widget_single_view
        skipif:
          conditions:
            - never
        partial:
          title: ${{ workflow.set_td_map_title.return }}
        map:
          argnames:
            - view
            - data
          argvalues: ${{ workflow.td_map.return }}
      - name: Merge Time Density Map Widget Views
        id: td_grouped_map_widget
        task: merge_widget_views
        partial:
          widgets: ${{ workflow.td_map_widget.return }}
  - name: Rename axis label for NSD plot
    id: nsd_rename_display_columns
    task: map_columns
    partial:
      drop_columns: []
      retain_columns: []
      rename_columns:
        segment_start: Time
        nsd: NSD (km²)
      raise_if_not_found: true
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.split_subject_traj_groups.return }}
  - name: Draw NSD Scatter Chart
    id: nsd_chart
    task: draw_ecoplot
    partial:
      group_by: subject_name
      ecoplot_configs:
        - x_col: Time
          y_col: NSD (km²)
          plot_style:
            xperiodalignment: null
          color_column: null
      tickformat: '%b-%Y'
      widget_id: ${{ workflow.set_nsd_chart_title.return }}
    mapvalues:
      argnames: dataframe
      argvalues: ${{ workflow.nsd_rename_display_columns.return }}
  - name: Persist NSD Scatter Chart as Text
    id: nsd_chart_html_url
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      filename_suffix: v2
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.nsd_chart.return }}
  - name: Create NSD Plot Widget
    id: nsd_chart_widget
    task: create_plot_widget_single_view
    skipif:
      conditions:
        - never
    partial:
      title: ${{ workflow.set_nsd_chart_title.return }}
    map:
      argnames:
        - view
        - data
      argvalues: ${{ workflow.nsd_chart_html_url.return }}
  - name: Merge NSD Widget Views
    id: grouped_nsd_chart_widget_merge
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.nsd_chart_widget.return }}
  - name: Create Dashboard with Subject Tracking Widgets
    id: subject_tracking_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return}}
      widgets:
        - ${{ workflow.traj_grouped_map_widget.return }}
        - ${{ workflow.mean_speed_grouped_sv_widget.return }}
        - ${{ workflow.max_speed_grouped_sv_widget.return }}
        - ${{ workflow.num_location_grouped_sv_widget.return }}
        - ${{ workflow.nightday_ratio_grouped_sv_widget.return }}
        - ${{ workflow.total_dist_grouped_sv_widget.return }}
        - ${{ workflow.total_time_grouped_sv_widget.return }}
        - ${{ workflow.td_grouped_map_widget.return }}
        - ${{ workflow.traj_nightday_grouped_map_widget.return }}
        - ${{ workflow.grouped_nsd_chart_widget_merge.return }}
      groupers: ${{ workflow.resolved_groupers.return }}
      time_range: ${{ workflow.time_range.return}}
      warning: ${{ workflow.warn_if_mixed_subtype.return}}
